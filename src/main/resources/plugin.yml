name: Guardio
version: '${project.version}'
main: com.fizz.pluginguard.PluginGuard
api-version: '1.21'
load: STARTUP
author: Fizz
description: Detects, quarantines, and restores tampered/infected plugin jars on load.
commands:
  guard:
    description: Guardio control — scan, status, trust a clean baseline, restore.
    usage: "/guard <scan|status|trust [all|<jar>]|restore <jar>|allow <jar>|heal>"
    permission: guardio.admin
permissions:
  guardio.admin:
    description: Manage Guardio.
    default: op
