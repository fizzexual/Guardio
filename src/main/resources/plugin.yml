name: Guardio
version: '${project.version}'
main: com.fizz.pluginguard.PluginGuard
api-version: '1.21'
load: STARTUP
author: Fizz
description: Detects, quarantines, and restores tampered/infected plugin jars on load.
commands:
  guardio:
    description: Guardio control — scan, status, trust, restore, heal, clean plugin reload.
    usage: "/guardio <scan|status|trust [all|<jar>]|restore <jar>|allow <jar>|heal|reload <plugin>>"
    aliases: [guard]
    permission: guardio.admin
permissions:
  guardio.admin:
    description: Manage Guardio.
    default: op
