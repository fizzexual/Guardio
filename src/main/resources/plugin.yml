name: PluginGuard
version: '${project.version}'
main: com.fizz.pluginguard.PluginGuard
api-version: '1.21'
load: STARTUP
author: Fizz
description: Detects, quarantines, and restores tampered/infected plugin jars on load.
commands:
  guard:
    description: PluginGuard control — scan, status, trust a clean baseline, restore.
    usage: "/guard <scan|status|trust [all|<jar>]|restore <jar>|allow <jar>|heal>"
    permission: pluginguard.admin
permissions:
  pluginguard.admin:
    description: Manage PluginGuard.
    default: op
