# ============================================================================
#  Guardio — whole-server integrity guard & malware remediation engine
#  Layout: guardio-v1.0.0.jar (root launcher) + /guardio (home) + this file.
#  Editing: change values, then `/guardio reload Guardio` or restart.
#  Do the first boot on a CLEAN install so the trusted baseline is clean.
# ============================================================================
config-version: 2

general:
  # Name shown in alerts/reports. "" = the server folder name.
  server-name: ""
  # Scan the whole tree when the plugin loads.
  scan-on-load: true
  # Re-scan every N minutes while running (0 = off).
  periodic-scan-minutes: 0
  # Notify online operators in-game when something is found.
  alert-ops: true
  # Check for a newer Guardio release on startup (logs only; never auto-downloads).
  update-check: true

scanning:
  # Folders (relative to the server root) scanned recursively. The server jar is always guarded.
  roots:
    - "plugins"
    - "libraries"
  # Report-only behavioural analysis (flags backdoor patterns; never auto-quarantines).
  heuristics: true
  # Report-only cracked/nulled-plugin detection (the #1 infection vector). Never auto-quarantines.
  detect-cracked: true
  # Drop canary/honeypot files and alert if anything tampers with them.
  honeypot: true
  # Real-time watcher: re-scan instantly when a jar appears or changes (debounced).
  real-time-watch: true

response:
  # Move infected jars into guardio/quarantine/.
  auto-quarantine: true
  # Restore the clean copy from the vault when a guarded jar changes.
  auto-restore: true
  # Map new clean jars into the vault baseline automatically.
  auto-map: true
  # Stop the server if infection is found at boot (off by default).
  shutdown-on-infection: false
  # Allowlist-only: refuse (quarantine) any NEW plugin that isn't already trusted/whitelisted. Strict mode.
  allowlist-only: false

heal:
  # Download a clean replacement (free sources + guardio/trusted/ backups) for an infected plugin with no vault copy.
  auto-download: true
  # Minecraft version for downloads. "" = auto-detect from the server.
  game-version: ""

threat-feed:
  # URL to a known-malware SHA-256 list (one hash per line; "#" comments). "" = disabled.
  # Cached to guardio/threat-feed.txt; a hash match is authoritative and overrides trust.
  url: ""

# ----------------------------------------------------------------------------
#  Discord alerts. The launcher (pre-boot) reads `discord-webhook` in guardio.properties;
#  the plugin uses the webhook below, FALLING BACK to that one if this is blank — set it once.
# ----------------------------------------------------------------------------
discord:
  enabled: false
  webhook: ""
  # Role pinged on an infection/quarantine, e.g. "123456789012345678". "" = no ping.
  mention-role-id: ""
  # true = rich embed, false = plain text line.
  embeds: true
  alerts:
    quarantine: true
    restore: true
    heal: true
    suspicious: true

# ----------------------------------------------------------------------------
#  ADVANCED — malware signatures (only strings/paths absent from real libraries, to avoid
#  false positives). A false alarm? `/guardio allow <jar>` or add a fragment to
#  guardio/whitelist.txt. Whitelisted jars skip signatures but are still integrity-checked.
# ----------------------------------------------------------------------------
signatures:
  content:                       # text searched inside .class files
    - "pluginstatstrack"
  entry:                         # zip-entry path fragments (hidden packages)
    - "javassist/orgs/"
    - "javassist/ws/"
