# ============================================================================
#  PluginGuard — пази целостта на папката /plugins (МОДЕЛ: map-then-load).
#
#  • НОВ плъгин → проверява се за сигнатури; ако е чист, се "мапва" (копира се
#    в vault/) като еталон. Ако носи сигнатура — карантинира се и НЕ се мапва.
#  • МАПНАТ плъгин → ако живият jar съвпада с мапнатото копие, се зарежда както
#    е; ако се различава (заразен/подменен/обновен) — живият се карантинира и се
#    възстановява безопасното мапнато копие.
#
#  Истинската защита "преди всички плъгини" е АГЕНТЪТ (виж README) — добави в
#  стартовия скрипт:  -javaagent:plugins/PluginGuard-1.0.0.jar
#  Като ПЛЪГИН (без агента) подмяната се прилага при изключване (jar-овете са
#  заключени по време на работа), тоест важи от СЛЕДВАЩОТО стартиране.
#
#  ВАЖНО: PluginGuard пази ЧИСТА основа. Първо изчисти машината и сложи чисти
#  jar-ове — чак тогава остави авто-мапването да ги запомни (или `/guard trust all`).
#  Легитимно обновяване със същото име на файл → ще се върне към мапнатото;
#  приеми новата версия с `/guard trust <jar>`.
# ============================================================================

scan-on-load: true              # сканирай при зареждане
auto-map: true                  # мапвай нови чисти jar-ове в vault/ автоматично

# --- Авто-лечение: при заразен плъгин БЕЗ чисто копие във vault, свали чисто отвън ---
auto-download: true             # сваляй чисто копие за заразени плъгини (САМО безплатни източници)
download-game-version: ""       # "" = авто (версията на сървъра); или фиксирай напр. "1.21.11"
# Източник по подразбиране = Modrinth (по име). Ръчни препратки: plugins/PluginGuard/sources.yml
# (ключ = име на плъгина или име на jar; стойност = modrinth:<slug> | url:<jar-url> | github:<owner/repo>).
# Премиум/частни плъгини НЕ могат да се свалят автоматично — маркират се за ръчно преинсталиране.

# Кои папки да се пазят (релативно към сървър-руут). Сървърният jar в руута (purpur/paper)
# се пази ВИНАГИ. ЗАБ.: мапването копира jar-овете във vault/ (диск ≈ размера на jar-овете);
# махни "libraries", ако искаш по-малко диск. versions/cache са по избор (Paper ги регенерира).
scan-roots:
  - "plugins"
  - "libraries"
# - "versions"
# - "cache"

periodic-scan-minutes: 0        # >0 = пресканирай на всеки N минути докато върви
alert-ops: true                 # съобщавай на онлайн оператори при засичане
auto-quarantine: true           # мести заразените в quarantine/
auto-restore: true              # възстановявай безопасните от vault/
shutdown-on-infection: false    # спри сървъра, ако се засече зараза на старта

# --- Аларми по Discord webhook (празно = изключено): праща при карантина/лечение/съмнение ---
discord-webhook: ""             # напр. https://discord.com/api/webhooks/....
server-name: ""                 # име в алармите ("" = името на папката на сървъра)

# --- Threat-intel feed: URL към списък с SHA-256 на познат малуер (1 на ред, "#"=коментар; ""=изкл.).
#     Хваща познат payload дори преименуван. Кешира се в guardio/threat-feed.txt. ---
threat-feed-url: ""

# --- Евристика (САМО ДОКЛАД, не карантинира): маркира backdoor-поведения по плъгините
#     (runtime defineClass, отдалечено зареждане на класове, Runtime.exec). ---
heuristics: true

# --- Премиум/платени плъгини без безплатен източник: сложи ЧИСТО копие в guardio/trusted/ ;
#     при зараза Guardio ще възстанови оттам (след проверка, че копието е чисто). ---

# --- Сигнатури: само МАЛУЕР-СПЕЦИФИЧНИ (тези низове/пътища ГИ НЯМА в истински библиотеки),
#     за да няма фалшиви аларми по легитимни плъгини. Напр. Nexo ползва checkip.amazonaws.com за
#     self-host, а java_websocket/dev.jnic ползват легитимни/обфускирани плъгини — затова НЕ са тук. ---
content-signatures:             # текст, търсен В .class файловете
  - "pluginstatstrack"          # уникалният C2 домейн на този малуер
entry-signatures:               # имена на zip-записи = скрити пакети (липсват в истинския javassist)
  - "javassist/orgs/"
  - "javassist/ws/"

# Фалшива аларма? Сложи името на jar-а (или част от него) в plugins/PluginGuard/whitelist.txt
# (по едно на ред), или в игра:  /guard allow <jar>.  Whitelist-натите се пропускат при
# сигнатурната проверка, но пак се пазят чрез integrity hash (vault).

ignore:                         # файлове (по име, без .jar), които НИКОГА да не сканира/пипа
  - "PluginGuard"
